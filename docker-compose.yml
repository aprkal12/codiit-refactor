version: '3.8'

services:
  # =========================================
  # 1. API 서버 (Blue/Green 배포 대상)
  # =========================================
  api-server:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
    container_name: api-server
    restart: always
    environment:
      - NODE_ENV=production
      - AWS_REGION=${AWS_REGION}
    ports:
      - '3000:3000' # 호스트:컨테이너
    command: npm run start:api
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION}
        awslogs-group: /codiit/production/api-server
        awslogs-stream: ${IMAGE_TAG} # 커밋 해시를 스트림명으로 사용하여 배포 버전별 분리
        awslogs-create-group: 'true'

  # =========================================
  # 2. 재고 관리 워커 (독립 실행)
  # =========================================
  stock-worker:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
    container_name: stock-worker
    restart: always
    command: npm run start:worker
    environment:
      - NODE_ENV=production
      - AWS_REGION=${AWS_REGION}
    depends_on:
      - api-server # API 이미지가 빌드된 후에 실행되도록
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION}
        awslogs-group: /codiit/production/stock-worker
        awslogs-stream: ${IMAGE_TAG}
        awslogs-create-group: 'true'

  nginx:
    image: nginx:latest
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - api-server
